name: Swift Package CI

on:
  push:
    paths:
      - 'AgentWatchCore/**'
      - '.github/workflows/ios.yml'
  pull_request:
    paths:
      - 'AgentWatchCore/**'

jobs:
  swift-package-tests:
    name: Swift Package Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build AgentWatchCore
        working-directory: AgentWatchCore
        run: swift build

      - name: Run AgentWatchCore tests
        working-directory: AgentWatchCore
        run: swift test --parallel

